<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Connect Social App</title>
    <style>
        :root { --main-color: #6c5ce7; --bg-color: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Login */
        #login-screen { height: 100vh; background: linear-gradient(135deg, #6c5ce7, #a29bfe); display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--main-color); color: white; cursor: pointer; font-weight: bold; }

        /* Header */
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .profile-small { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--main-color); cursor: pointer; object-fit: cover; }

        /* Story Bar */
        .story-bar { display: flex; gap: 15px; padding: 20px; background: white; overflow-x: auto; }
        .story-add { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #2ecc71; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .story-item { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ddd; flex-shrink: 0; overflow: hidden; }
        .story-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Chat UI */
        .modal { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; }
        .modal-header { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        .chat-stream { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #efeae2; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 75%; position: relative; }
        .bubble.me { background: #d9fdd3; align-self: flex-end; }
        .bubble.other { background: white; align-self: flex-start; }
        
        /* Chat Input Bar */
        .chat-input-bar { padding: 10px; background: #f0f0f0; display: flex; align-items: center; gap: 8px; }
        .media-btn { font-size: 22px; cursor: pointer; padding: 5px; }
        .rec-active { color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Profile & FAB */
        .big-img { width: 120px; height: 120px; border-radius: 50%; background: #eee; margin: 20px auto; display: block; border: 4px solid var(--main-color); object-fit: cover; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--main-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 90; }
        
        /* Call Overlay */
        .call-screen { position: fixed; inset: 0; background: #2c3e50; color: white; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="card">
            <h2 style="text-align: center; color: var(--main-color);">Connect</h2>
            <input type="text" id="reg-name" placeholder="User Name">
            <input type="tel" id="reg-phone" placeholder="Phone Number">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <header>
            <h2 style="margin:0; color: var(--main-color);">Connect</h2>
            <img src="https://flaticon.com" class="profile-small" onclick="openModal('profile-modal')">
        </header>

        <div class="story-bar">
            <div class="story-add" onclick="openCamera()">+</div>
            <div id="story-list" style="display: flex; gap: 10px;"></div>
        </div>

        <div style="padding: 20px; background: white; margin: 10px; border-radius: 15px; cursor: pointer;" onclick="openModal('bot-modal')">
            <b>🤖 Welcome Chatbot (AI)</b><br><small>Ask me anything...</small>
        </div>

        <h4 style="margin: 20px;">Recent Chats</h4>
        <div id="recent-chats-list"></div>

        <div class="fab" onclick="openModal('search-modal')">+</div>
    </div>

    <!-- CHAT BOX -->
    <div id="chat-modal" class="modal hidden">
        <div class="modal-header">
            <button onclick="closeModal('chat-modal')">Back</button>
            <b id="chat-user-name" onclick="viewFriendProfile()">Friend Name</b>
            <button onclick="startCall()" style="background:#2ecc71; width:auto; padding:5px 10px;">📞 Call</button>
        </div>
        <div id="chat-stream" class="chat-stream"></div>
        <div class="chat-input-bar">
            <label class="media-btn">📷<input type="file" accept="image/*" class="hidden" onchange="sendMedia(this, 'img')"></label>
            <label class="media-btn">🎥<input type="file" accept="video/*" class="hidden" onchange="sendMedia(this, 'vid')"></label>
            <span id="mic-btn" class="media-btn" onclick="toggleVoiceRecord()">🎙️</span>
            <input type="text" id="chat-in" placeholder="Message..." style="flex:1;">
            <button onclick="sendText()" style="width: 60px;">Send</button>
        </div>
    </div>

    <!-- CALL SCREEN -->
    <div id="call-screen" class="call-screen hidden">
        <h2>Calling...</h2>
        <h1 id="call-target">Name</h1>
        <div id="timer">00:00</div>
        <button onclick="endCall()" style="background:red; border-radius:50px; width:150px;">End Call</button>
    </div>

    <!-- SEARCH MODAL -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-header"><button onclick="closeModal('search-modal')">Back</button> <span>Find Friend</span> <div></div></div>
        <div style="padding: 20px;">
            <input type="tel" id="search-ph" placeholder="Phone (Try: 09123456789)">
            <button onclick="searchFriend()">Search</button>
            <div id="search-res" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- PROFILE MODAL (OWN) -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-header"><button onclick="closeModal('profile-modal')">Back</button> <span>My Profile</span> <div></div></div>
        <img src="https://flaticon.com" class="big-img">
        <div style="padding:20px; text-align:center;">
            <h2 id="my-name-disp">Name</h2>
            <p id="my-phone-disp">Phone</p>
            <input type="color" onchange="document.documentElement.style.setProperty('--main-color', this.value)"> Theme Color
            <button onclick="logout()" style="background:red; margin-top:30px;">Logout</button>
        </div>
    </div>

    <!-- CAMERA MODAL -->
    <div id="camera-modal" class="modal hidden" style="background:black;">
        <video id="video-feed" autoplay playsinline style="flex:1; object-fit:cover;"></video>
        <div style="padding:30px; display:flex; justify-content:space-around; background:#000;">
            <button onclick="closeCamera()">Back</button>
            <button onclick="takeShot()" style="width:70px; height:70px; border-radius:50%; border:4px solid white; background:none;"></button>
            <button onclick="flipCam()">Flip</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let stream;
        let camMode = "user";
        const mockDb = {"09123456789": {name: "Ko Mg Mg", phone: "09123456789"}};

        // AUTH
        function login() {
            const u = { name: document.getElementById('reg-name').value, phone: document.getElementById('reg-phone').value };
            if(!u.name || !u.phone) return alert("Fill all!");
            localStorage.setItem('user', JSON.stringify(u));
            location.reload();
        }
        window.onload = () => {
            const saved = localStorage.getItem('user');
            if(saved) {
                const u = JSON.parse(saved);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('my-name-disp').innerText = u.name;
                document.getElementById('my-phone-disp').innerText = u.phone;
            }
        };
        function logout() { localStorage.clear(); location.reload(); }

        // MODALS
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // SEARCH & CHAT
        function searchFriend() {
            const ph = document.getElementById('search-ph').value;
            const res = document.getElementById('search-res');
            if(mockDb[ph]) {
                res.innerHTML = `<div style="padding:15px; background:#eee; border-radius:10px; display:flex; justify-content:space-between;">
                    <b>${mockDb[ph].name}</b> <button onclick="startChat('${ph}')" style="width:auto;">Chat</button>
                </div>`;
            } else { res.innerHTML = "No user found."; }
        }

        function startChat(ph) {
            closeModal('search-modal');
            document.getElementById('chat-user-name').innerText = mockDb[ph].name;
            openModal('chat-modal');
        }

        function sendText() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            const box = document.getElementById('chat-stream');
            box.innerHTML += `<div class="bubble me">${inp.value}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;
        }

        // VOICE RECORDING (REAL)
        async function toggleVoiceRecord() {
            const btn = document.getElementById('mic-btn');
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];
                isRecording = true;
                btn.classList.add('rec-active');
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('chat-stream').innerHTML += `<div class="bubble me"><audio src="${url}" controls></audio></div>`;
                };
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('rec-active');
            }
        }

        // PHOTO/VIDEO SENDING
        function sendMedia(input, type) {
            const file = input.files[0];
            if(!file) return;
            const url = URL.createObjectURL(file);
            const box = document.getElementById('chat-stream');
            if(type === 'img') box.innerHTML += `<div class="bubble me"><img src="${url}" style="width:100%; border-radius:10px;"></div>`;
            else box.innerHTML += `<div class="bubble me"><video src="${url}" controls style="width:100%; border-radius:10px;"></video></div>`;
            box.scrollTop = box.scrollHeight;
        }

        // CALL
        function startCall() {
            document.getElementById('call-target').innerText = document.getElementById('chat-user-name').innerText;
            openModal('call-screen');
        }
        function endCall() { closeModal('call-screen'); }

        // CAMERA
        async function openCamera() {
            openModal('camera-modal');
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camMode } });
            document.getElementById('video-feed').srcObject = stream;
        }
        function closeCamera() {
            stream.getTracks().forEach(t => t.stop());
            closeModal('camera-modal');
        }
        function flipCam() {
            camMode = camMode === "user" ? "environment" : "user";
            closeCamera(); openCamera();
        }
        function takeShot() {
            alert("Story Posted! Will disappear in 24 hours.");
            closeCamera();
        }
    </script>
</body>
</html>
