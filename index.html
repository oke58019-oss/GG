<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Chat</title>

<style>
:root{
  --sky:#8fd3ff;
  --sky2:#bfe9ff;
  --accent:#00a86b;
  --card:#ffffff;
  --text:#222;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui, -apple-system, Arial;
  background:linear-gradient(180deg,var(--sky),var(--sky2));
  color:var(--text);
}
.page{display:none;height:100vh;}

/* ===== Login ===== */
#login{display:flex;align-items:center;justify-content:center}
.loginCard{
  width:92%;max-width:380px;
  background:rgba(255,255,255,.9);
  backdrop-filter: blur(6px);
  padding:20px;border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
.loginCard h2{text-align:center;margin:0 0 10px}
.inp{
  width:100%;padding:12px;margin:6px 0;
  border-radius:12px;border:1px solid #ddd;
}
.btn{
  width:100%;padding:12px;margin-top:10px;
  border:none;border-radius:14px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;font-weight:600;
}
.small{font-size:12px;opacity:.7;text-align:center;margin-top:6px}

/* ===== Chat ===== */
#chat{position:relative}
.top{
  height:64px;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.profileBtn{
  position:absolute;left:12px;
  width:44px;height:44px;border-radius:50%;
  overflow:hidden;background:#ddd;
  box-shadow:0 3px 10px rgba(0,0,0,.2);
}
.profileBtn img{width:100%;height:100%}
.storyBtn{
  width:56px;height:56px;border-radius:50%;
  border:3px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  background:#fff;font-size:22px;font-weight:bold;
}
.logout{
  position:absolute;right:12px;
  padding:6px 10px;border-radius:20px;
  border:none;background:#ff5b5b;color:#fff;font-size:12px;
}

/* divider (2 color) */
.divider{
  height:5px;width:100%;
  background:linear-gradient(to bottom,#00a86b 50%, #ffffff 50%);
}

/* messages */
#messages{
  height:58%;overflow:auto;padding:10px;
}
.msg{
  background:#fff;padding:10px;border-radius:14px;
  margin:6px 0;max-width:75%;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.me{margin-left:auto}

/* input */
.inputBar{
  position:absolute;bottom:0;width:100%;
  background:#fff;border-top-left-radius:16px;border-top-right-radius:16px;
  display:flex;padding:6px;
}
.inputBar input{flex:1;border:none;padding:10px}
.iconBtn{
  width:38px;height:38px;border-radius:50%;
  border:none;background:#eee;margin:0 4px;
}
#file{display:none}

/* ===== Profile ===== */
#profile{padding:12px}
.headerRow{display:flex;align-items:center;justify-content:space-between}
.round{
  width:90px;height:90px;border-radius:50%;
  overflow:hidden;background:#ddd;margin:auto;
}
.round img{width:100%;height:100%}
.menuBtn{
  width:36px;height:36px;border-radius:50%;
  border:none;background:#eee;
}
.sheet{
  display:none;position:fixed;bottom:0;left:0;width:100%;
  background:#fff;border-top-left-radius:18px;border-top-right-radius:18px;
  padding:12px;box-shadow:0 -6px 20px rgba(0,0,0,.2);
}
.sheet button{width:100%;margin:6px 0;padding:10px;border-radius:12px;border:none;background:#eee}

.colors span{
  display:inline-block;width:28px;height:28px;border-radius:6px;margin:4px;cursor:pointer
}

/* ===== Story ===== */
#storyPage{padding:12px}
.storyCard{
  background:#fff;border-radius:14px;padding:10px;margin-top:10px
}
</style>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div id="login" class="page" style="display:flex">
  <div class="loginCard">
    <h2>Welcome</h2>
    <input id="name" class="inp" placeholder="Username">
    <input id="phone" class="inp" placeholder="Phone">
    <input id="pass" type="password" class="inp" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <div class="small">Password မှန်မှသာ ပြန်ဝင်နိုင်ပါမည်</div>
  </div>
</div>

<!-- ===== CHAT ===== -->
<div id="chat" class="page">
  <div class="top">
    <div class="profileBtn" onclick="openProfile()"></div>
    <div class="storyBtn" onclick="openStory()">＋</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
  <div class="divider"></div>

  <div id="messages"></div>

  <div class="inputBar">
    <button class="iconBtn" onclick="file.click()">＋</button>
    <input id="msg" placeholder="Type message...">
    <button class="iconBtn" onclick="sendMsg()">➤</button>
    <input type="file" id="file" accept="image/*,video/*">
  </div>
</div>

<!-- ===== PROFILE ===== -->
<div id="profile" class="page">
  <div class="headerRow">
    <button onclick="back()">⬅</button>
    <button class="menuBtn" onclick="toggleSheet()">⋯</button>
  </div>

  <div class="round" id="pimgBox"></div>
  <h3 id="pname" style="text-align:center"></h3>

  <p>ID: <span id="pid"></span></p>

  <select id="privacy">
    <option>Only me</option>
    <option>Friend only</option>
    <option>Public</option>
  </select>

  <textarea id="bio" placeholder="Bio..." style="width:100%;height:60px"></textarea>

  <h4>Background</h4>
  <div class="colors">
    <span style="background:pink" onclick="setBg('pink')"></span>
    <span style="background:orange" onclick="setBg('orange')"></span>
    <span style="background:lightgreen" onclick="setBg('lightgreen')"></span>
    <span style="background:white" onclick="setBg('white')"></span>
    <span style="background:black" onclick="setBg('black')"></span>
  </div>

  <div class="sheet" id="sheet">
    <button onclick="viewProfile()">View</button>
    <button onclick="changeProfile()">Change</button>
    <button onclick="deleteProfile()">Delete</button>
  </div>

  <input type="file" id="pfile" style="display:none">
</div>

<!-- ===== STORY ===== -->
<div id="storyPage" class="page">
  <button onclick="back()">⬅ Back</button>

  <input type="file" id="storyFile" accept="image/*,video/*">

  <select id="storyPrivacy">
    <option>Only me</option>
    <option>Friend only</option>
    <option>Public</option>
  </select>

  <button onclick="uploadStory()">Upload</button>

  <div id="storyList"></div>
</div>

<script>

// ===== LOGIN =====
function login(){
 let n=name.value,p=phone.value,ps=pass.value;

 if(localStorage.pass && localStorage.pass!==ps){
   alert("Password မှားပါတယ်");
   return;
 }
 localStorage.name=n;
 localStorage.phone=p;
 localStorage.pass=ps;

 showChat();
}

// ===== CHAT =====
function showChat(){
 show("chat");
 loadProfile();
 loadMsg();
 addMsg("🤖 Welcome AI");
}

// ===== LOGOUT =====
function logout(){
 localStorage.removeItem("pass");
 location.reload();
}

// ===== MESSAGE =====
function sendMsg(){
 if(!msg.value) return;
 saveMsg(`<div class='msg me'>${msg.value} ✔</div>`);
 msg.value="";
}

// file send
file.onchange=()=>{
 let f=file.files[0];
 let url=URL.createObjectURL(f);
 let html=f.type.startsWith("image")
 ? `<img src="${url}" width="120">`
 : `<video src="${url}" width="120" controls></video>`;

 saveMsg(`<div class='msg me'>${html} ✔✔</div>`);
}

// save/load msg
function saveMsg(m){
 let arr=JSON.parse(localStorage.msg||"[]");
 arr.push(m);
 localStorage.msg=JSON.stringify(arr);
 loadMsg();
}
function loadMsg(){
 messages.innerHTML="";
 (JSON.parse(localStorage.msg||"[]")).forEach(m=>{
   messages.innerHTML+=m;
 });
}

// ===== PROFILE =====
function openProfile(){
 show("profile");
 pname.innerText=localStorage.name;
 pid.innerText=localStorage.phone;
 bio.value=localStorage.bio||"";
 loadProfile();
}

function toggleSheet(){
 sheet.style.display=sheet.style.display=="block"?"none":"block";
}

function viewProfile(){ alert("Profile View"); }

function changeProfile(){
 pfile.click();
}
pfile.onchange=()=>{
 let f=pfile.files[0];
 localStorage.pimg=URL.createObjectURL(f);
 loadProfile();
}

function deleteProfile(){
 localStorage.removeItem("pimg");
 loadProfile();
}

function loadProfile(){
 let img=localStorage.pimg;
 let html=img?`<img src="${img}">`:"";
 pimgBox.innerHTML=html;
 document.querySelector(".profileBtn").innerHTML=html;
}

// ===== BG =====
function setBg(c){
 chat.style.background=c;
 localStorage.bg=c;
}

// ===== STORY =====
function openStory(){
 show("storyPage");
 loadStory();
}
function uploadStory(){
 let f=storyFile.files[0];
 let arr=JSON.parse(localStorage.story||"[]");
 arr.push({url:URL.createObjectURL(f),time:Date.now()});
 localStorage.story=JSON.stringify(arr);
 loadStory();
}
function loadStory(){
 storyList.innerHTML="";
 (JSON.parse(localStorage.story||"[]")).forEach(s=>{
  if(Date.now()-s.time<86400000){
    storyList.innerHTML+=`<div class="storyCard"><img src="${s.url}" width="120"></div>`;
  }
 });
}

// ===== UTIL =====
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
 document.getElementById(id).style.display="block";
}
function back(){ show("chat"); }

// init
if(localStorage.pass){showChat();}
if(localStorage.bg){chat.style.background=localStorage.bg;}

</script>

</body>
</html>
