<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#87CEEB;
}

/* GENERAL */
.page{display:none;height:100vh;}
button{
 padding:8px 12px;
 border:none;
 border-radius:12px;
 background:#4CAF50;
 color:white;
 margin:3px;
}

/* LOGIN */
#login{
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}
input{
 padding:10px;
 margin:5px;
 border-radius:10px;
 border:1px solid #ccc;
 width:230px;
}

/* CHAT */
#chat{position:relative;}
#topBar{
 display:flex;
 justify-content:center;
 align-items:center;
 height:60px;
 position:relative;
}
#profileBtn{
 position:absolute;
 left:10px;
 width:45px;height:45px;
 border-radius:50%;
 background:#ddd;
 overflow:hidden;
}
#profileBtn img{width:100%;height:100%}

#storyBtn{
 width:55px;height:55px;
 border-radius:50%;
 border:3px solid green;
 display:flex;
 align-items:center;
 justify-content:center;
 background:white;
 font-weight:bold;
}

/* MESSAGES */
#messages{
 height:60%;
 overflow:auto;
 padding:10px;
}
.msg{
 background:white;
 padding:8px;
 margin:5px;
 border-radius:10px;
 max-width:70%;
}

/* INPUT */
#inputArea{
 position:absolute;
 bottom:0;
 width:100%;
 display:flex;
 background:white;
}
#msg{flex:1}
#file{display:none}

/* PROFILE */
#profile{padding:15px}
.color{
 width:30px;height:30px;
 display:inline-block;
 margin:5px;
 border-radius:5px;
}

/* STORY */
#storyPage{padding:15px}

.storyBox{
 background:white;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:flex">
<h2>Login</h2>
<input id="name" placeholder="Username">
<input id="phone" placeholder="Phone">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div id="topBar">
<div id="profileBtn" onclick="openProfile()"></div>
<div id="storyBtn" onclick="openStory()">+</div>
</div>

<div id="messages"></div>

<div id="inputArea">
<button onclick="file.click()">＋</button>
<input type="file" id="file" accept="image/*,video/*">
<input id="msg" placeholder="Type...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<button onclick="back()">⬅</button>

<h2 id="pname"></h2>
<img id="pimg" width="100"><br><br>

<input type="file" id="pfile">
<button onclick="changeProfile()">Change</button>
<button onclick="deleteProfile()">Delete</button>

<p>ID: <span id="pid"></span></p>

<select id="privacy">
<option>Only me</option>
<option>Friend only</option>
<option>Public</option>
</select>

<br><br>
<textarea id="bio" placeholder="Write bio..."></textarea>

<h3>Background</h3>
<div class="color" style="background:pink" onclick="setBg('pink')"></div>
<div class="color" style="background:orange" onclick="setBg('orange')"></div>
<div class="color" style="background:lightgreen" onclick="setBg('lightgreen')"></div>
<div class="color" style="background:white" onclick="setBg('white')"></div>
<div class="color" style="background:black" onclick="setBg('black')"></div>

</div>

<!-- STORY -->
<div id="storyPage" class="page">
<button onclick="back()">⬅</button>

<h3>Upload Story</h3>
<input type="file" id="storyFile" accept="image/*,video/*">

<select id="storyPrivacy">
<option>Only me</option>
<option>Friend only</option>
<option>Public</option>
</select>

<button onclick="uploadStory()">Upload</button>

<div id="storyList"></div>
</div>

<script>

// LOGIN
function login(){
 let name=nameInput("name");
 let phone=nameInput("phone");
 let pass=nameInput("pass");

 if(localStorage.pass && localStorage.pass!==pass){
  alert("Password မှားပါတယ်");
  return;
 }

 localStorage.name=name;
 localStorage.phone=phone;
 localStorage.pass=pass;

 showChat();
}

// SHOW CHAT
function showChat(){
 hideAll();
 chat.style.display="block";

 loadProfile();
 loadMsg();
 loadStory();

 addMsg("🤖 Welcome AI");
}

// SEND TEXT
function sendMsg(){
 let m=msg.value;
 if(!m) return;

 saveMsg("✔ "+m);
 msg.value="";
}

// SEND FILE
file.onchange=function(){
 let f=file.files[0];
 let url=URL.createObjectURL(f);

 if(f.type.startsWith("image")){
  saveMsg("<img src='"+url+"' width='120'> ✔✔");
 }else{
  saveMsg("<video src='"+url+"' width='120' controls></video> ✔✔");
 }
}

// SAVE MESSAGE
function saveMsg(m){
 let arr=JSON.parse(localStorage.msg||"[]");
 arr.push(m);
 localStorage.msg=JSON.stringify(arr);
 loadMsg();
}

// LOAD MSG
function loadMsg(){
 messages.innerHTML="";
 let arr=JSON.parse(localStorage.msg||"[]");
 arr.forEach(m=>{
  let d=document.createElement("div");
  d.className="msg";
  d.innerHTML=m;
  messages.appendChild(d);
 });
}

// PROFILE
function openProfile(){
 hideAll();
 profile.style.display="block";

 pname.innerText=localStorage.name;
 pid.innerText=localStorage.phone;
 pimg.src=localStorage.pimg||"";
 bio.value=localStorage.bio||"";
}

// PROFILE EDIT
function changeProfile(){
 let f=pfile.files[0];
 if(!f) return;
 localStorage.pimg=URL.createObjectURL(f);
 loadProfile();
}

function deleteProfile(){
 localStorage.removeItem("pimg");
 loadProfile();
}

function loadProfile(){
 if(localStorage.pimg){
  profileBtn.innerHTML="<img src='"+localStorage.pimg+"'>";
 }
}

// BG
function setBg(c){
 chat.style.background=c;
 localStorage.bg=c;
}

// STORY
function openStory(){
 hideAll();
 storyPage.style.display="block";
 loadStory();
}

function uploadStory(){
 let f=storyFile.files[0];
 if(!f) return;

 let arr=JSON.parse(localStorage.story||"[]");
 arr.push({url:URL.createObjectURL(f),time:Date.now()});
 localStorage.story=JSON.stringify(arr);

 loadStory();
}

// LOAD STORY
function loadStory(){
 storyList.innerHTML="";
 let arr=JSON.parse(localStorage.story||"[]");

 arr.forEach(s=>{
  if(Date.now()-s.time<86400000){
   let d=document.createElement("div");
   d.className="storyBox";
   d.innerHTML="<img src='"+s.url+"' width='120'>";
   storyList.appendChild(d);
  }
 });
}

// BACK
function back(){
 hideAll();
 chat.style.display="block";
}

// UTIL
function hideAll(){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
}

function nameInput(id){
 return document.getElementById(id).value;
}

// INIT
if(localStorage.pass){
 showChat();
}

if(localStorage.bg){
 chat.style.background=localStorage.bg;
}

</script>

</body>
</html>
