<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger App Final</title>
    <style>
        :root { --primary-color: #075e54; --app-bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--app-bg); transition: 0.3s; overflow-x: hidden; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .input-group { margin: 10px; width: 85%; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 85%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* Main UI */
        header { background: var(--primary-color); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .profile-circle { width: 40px; height: 40px; border-radius: 50%; background: #ddd; cursor: pointer; border: 2px solid white; overflow: hidden; position: relative; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Story Section */
        .story-section { padding: 15px; background: white; display: flex; gap: 15px; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .story-item { text-align: center; font-size: 12px; min-width: 65px; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #25d366; display: flex; align-items: center; justify-content: center; background: #eee; cursor: pointer; margin-bottom: 5px; font-size: 24px; }

        /* Floating Action Button */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 90; }

        /* Chat Screen */
        #chat-screen { display: none; position: fixed; inset: 0; background: white; z-index: 2500; flex-direction: column; }
        #message-area { flex: 1; padding: 15px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }

        /* Profile & Camera */
        #profile-panel { display: none; position: fixed; inset: 0; background: white; z-index: 1500; padding: 20px; overflow-y: auto; }
        #camera-layer { display: none; position: fixed; inset: 0; background: black; z-index: 4000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-btns { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; }

        /* Contact Modal */
        #contact-modal { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 20px; }
        .chat-card { background: #fff; padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <h2 style="color:var(--primary-color)">Messenger</h2>
        <div class="input-group"><input type="text" id="reg-name" placeholder="အမည် (User Name)"></div>
        <div class="input-group"><input type="tel" id="reg-phone" placeholder="ဖုန်းနံပါတ်"></div>
        <div class="input-group"><input type="password" id="reg-pass" placeholder="စကားဝှက် (Password)"></div>
        <button class="btn-main" onclick="registerAndLogin()">ဝင်မည်</button>
    </div>

    <!-- Main App Content -->
    <div id="main-app" style="display:none;">
        <header id="main-header">
            <span style="font-size: 20px; font-weight: bold;">Chats</span>
            <div class="profile-circle" onclick="toggleProfile()">
                <img id="header-img" src="https://placeholder.com">
            </div>
        </header>

        <div class="story-section">
            <div class="story-item">
                <div class="story-circle" onclick="startCamera('environment')">📷</div>
                <span>Story တင်ရန်</span>
            </div>
        </div>

        <div id="main-chat-list">
            <!-- Welcome Bot -->
            <div class="chat-card" onclick="openChat('Welcome Bot')">
                <div class="profile-circle" style="background:var(--primary-color); display:flex; align-items:center; justify-content:center; color:white;">🤖</div>
                <div><b>Welcome Bot</b><br><small style="color:green;">မင်္ဂလာပါ၊ ကြိုဆိုပါတယ်!</small></div>
            </div>
        </div>

        <div class="fab" onclick="openContactSearch()">+</div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <header style="background:var(--primary-color); color:white; padding:10px; display:flex; align-items:center; gap:10px;">
            <span onclick="closeChat()" style="cursor:pointer; font-size:22px;">⬅</span>
            <div class="profile-circle" style="width:35px; height:35px;"></div>
            <div style="flex:1"><b id="chat-user-name">User Name</b><br><small>Online</small></div>
            <span onclick="alert('ဖုန်းခေါ်ဆိုနေပါသည်...')" style="cursor:pointer; font-size:20px;">📞</span>
        </header>
        <div id="message-area"></div>
        <div style="padding:10px; background:#f0f0f0; display:flex; align-items:center; gap:10px;">
            <span onclick="alert('Photo/Video ရွေးရန်')" style="cursor:pointer; font-size:20px;">📎</span>
            <input type="text" id="msg-input" placeholder="စာရိုက်ပါ..." style="flex:1; padding:10px; border:none; border-radius:20px;">
            <span id="voice-btn" onclick="alert('Voice Recording...')" style="cursor:pointer; font-size:20px;">🎙️</span>
            <span id="send-btn" onclick="sendText()" style="display:none; cursor:pointer; font-size:22px; color:var(--primary-color);">➤</span>
        </div>
    </div>

    <!-- Profile Panel -->
    <div id="profile-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="toggleProfile()" style="cursor:pointer; font-size:18px;">⬅ Back</span>
            <span style="font-size:24px; cursor:pointer;" onclick="showProfileOptions()">⋮</span>
        </div>
        <center>
            <div class="profile-circle" style="width:100px; height:100px; margin: 20px;">
                <img id="profile-img-large" src="https://placeholder.com">
            </div>
            <h2 id="p-name">Name</h2>
            <p id="p-bio">Bio: Hello! I am using Messenger.</p>
            <p id="p-phone">Phone: -</p>
            <div style="text-align:left; width:85%; margin-top:20px;">
                <label>ဖုန်းနံပါတ် မြင်နိုင်သူ:</label>
                <select id="p-privacy" style="width:100%; padding:10px; margin-top:5px;">
                    <option>Only Me</option><option>Friends Only</option><option>Public</option>
                </select>
                <div style="margin-top:20px; background:#f9f9f9; padding:15px; border-radius:10px;">
                    <label><b>Theme အရောင်ပြောင်းရန်:</b></label><br>
                    <input type="color" id="theme-picker" style="width:100%; height:40px; margin:10px 0;">
                    <button class="btn-main" style="width:100%;" onclick="saveTheme()">တပ်ဆင်မည်</button>
                </div>
                <button class="btn-main" style="background:#ff4444; margin-top:30px; width:100%;" onclick="logOut()">Log Out ထွက်မည်</button>
            </div>
        </center>
    </div>

    <!-- Contact Search Modal -->
    <div id="contact-modal">
        <span onclick="closeContactSearch()" style="cursor:pointer; font-size:20px;">⬅ ရှာဖွေရန်</span>
        <input type="tel" id="search-input" placeholder="ဖုန်းနံပါတ်ဖြင့် ရှာဖွေပါ..." onkeyup="searchUser()" style="margin-top:20px;">
        <div id="search-results" style="margin-top:20px;"></div>
    </div>

    <!-- Camera Layer -->
    <div id="camera-layer">
        <video id="video-stream" autoplay playsinline></video>
        <div class="cam-btns">
            <button class="btn-main" style="width:70px; height:70px; border-radius:50%; background:red;" onclick="closeCamera()">❌</button>
            <button class="btn-main" style="width:70px; height:70px; border-radius:50%; background:white;" onclick="alert('Photo Taken!')">📸</button>
            <button class="btn-main" style="width:70px; height:70px; border-radius:50%;" onclick="switchCamera()">🔄</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentStream = null;
        let facingMode = "user";

        // Login Check
        window.onload = () => {
            const savedUser = localStorage.getItem('user');
            if(savedUser) { currentUser = JSON.parse(savedUser); loadApp(); }
            const savedTheme = localStorage.getItem('theme');
            if(savedTheme) applyTheme(savedTheme);
        };

        function registerAndLogin() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(name && phone && pass) {
                currentUser = { name, phone, pass };
                localStorage.setItem('user', JSON.stringify(currentUser));
                loadApp();
            } else { alert("အချက်အလက်ဖြည့်ပါ"); }
        }

        function loadApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('p-name').innerText = currentUser.name;
            document.getElementById('p-phone').innerText = "Phone: " + currentUser.phone;
        }

        document.getElementById('msg-input').addEventListener('input', function(e) {
            document.getElementById('send-btn').style.display = e.target.value.trim() ? "block" : "none";
            document.getElementById('voice-btn').style.display = e.target.value.trim() ? "none" : "block";
        });

        function sendText() {
            const input = document.getElementById('msg-input');
            const area = document.getElementById('message-area');
            area.innerHTML += `<div class="msg sent">${input.value}</div>`;
            input.value = "";
            area.scrollTop = area.scrollHeight;
            document.getElementById('send-btn').style.display = "none";
            document.getElementById('voice-btn').style.display = "block";
        }

        function saveTheme() {
            const color = document.getElementById('theme-picker').value;
            localStorage.setItem('theme', color);
            applyTheme(color);
            alert("Theme တပ်ဆင်ပြီးပါပြီ");
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--primary-color', color);
            document.getElementById('main-header').style.backgroundColor = color;
            document.body.style.backgroundColor = color + "10";
        }

        async function startCamera(mode) {
            facingMode = mode;
            document.getElementById('camera-layer').style.display = 'block';
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                document.getElementById('video-stream').srcObject = currentStream;
            } catch (e) { alert("Camera ဖွင့်မရပါ"); closeCamera(); }
        }

        function closeCamera() {
            if(currentStream) currentStream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-layer').style.display = 'none';
        }

        function switchCamera() { closeCamera(); startCamera(facingMode === "user" ? "environment" : "user"); }
        function toggleProfile() { const p = document.getElementById('profile-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        function openChat(name) { document.getElementById('chat-screen').style.display = 'flex'; document.getElementById('chat-user-name').innerText = name; }
        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }
        function openContactSearch() { document.getElementById('contact-modal').style.display = 'block'; }
        function closeContactSearch() { document.getElementById('contact-modal').style.display = 'none'; }
        function logOut() { if(confirm("Log Out ထွက်မှာလား?")) { localStorage.removeItem('user'); location.reload(); } }
        function showProfileOptions() {
            const act = confirm("Profile ပုံ ကြည့်မလား (OK) သို့မဟုတ် ပြောင်းမလား (Cancel)?");
            if(!act) alert("Album ထဲမှ ပုံရွေးချယ်ရန် ပြင်ဆင်နေသည်...");
        }
        function searchUser() {
            const val = document.getElementById('search-input').value;
            if(val.length > 5) {
                document.getElementById('search-results').innerHTML = `<div class="chat-card" onclick="openChat('${val}'); closeContactSearch();"><div class="profile-circle"></div><div style="flex:1"><b>User (${val})</b><br><small>Online</small></div><button style="background:#25d366; color:white; border:none; padding:8px; border-radius:5px;">Chat</button></div>`;
            }
        }
    </script>
</body>
</html>
