<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect App</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1a1d29;
            --primary-purple: #8e44ad;
            --accent-green: #2ecc71;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s;
        }

        /* Login & Screen Styles */
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #25293a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-purple { background: linear-gradient(to right, #9d50bb, #6e48aa); color: white; }
        .btn-green { background: #2ecc71; color: white; }

        /* Story & Avatar Styles */
        .avatar-selection { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .bear-avatar { width: 50px; height: 50px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; }
        .bear-avatar.selected { border-color: var(--primary-purple); }

        /* Main App Header */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .settings-icon { font-size: 24px; cursor: pointer; }

        /* Chat Bot Area */
        .chatbot-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- 1. Login Screen -->
<div id="login-screen" class="screen active">
    <div class="card">
        <h2 style="color: var(--primary-purple)">Get Started</h2>
        <p>ဖုန်းနံပါတ်ဖြင့် တိုက်ရိုက်ဝင်ရောက်ပါ</p>
        <input type="text" id="user-name" placeholder="သင့်အမည်">
        <input type="text" id="phone-number" placeholder="09xxxxxxxxx">
        <button class="btn btn-purple" onclick="showScreen('upload-screen')">Login ဝင်မည်</button>
    </div>
</div>

<!-- 2. Upload Photo & Bear Selection -->
<div id="upload-screen" class="screen">
    <div class="card">
        <h2 style="color: var(--primary-purple)">Upload Photo</h2>
        <div id="preview-circle" style="width: 100px; height: 100px; border: 3px solid var(--primary-purple); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
            <span id="preview-text">Preview</span>
        </div>
        <p>ဝက်ဝံလေးများ ရွေးချယ်နိုင်သည်</p>
        <div class="avatar-selection">
            <img src="https://flaticon.com" class="bear-avatar" onclick="selectBear(this)">
            <img src="https://flaticon.com" class="bear-avatar" onclick="selectBear(this)">
            <img src="https://flaticon.com" class="bear-avatar" onclick="selectBear(this)">
            <img src="https://flaticon.com" class="bear-avatar" onclick="selectBear(this)">
            <img src="https://flaticon.com" class="bear-avatar" onclick="selectBear(this)">
        </div>
        <button class="btn btn-purple">Select Photo</button>
        <button class="btn btn-green" onclick="showScreen('home-screen')">Done</button>
        <p style="cursor:pointer; font-size: 14px;" onclick="showScreen('home-screen')">Skip (မတင်ဘဲကျော်မည်)</p>
    </div>
</div>

<!-- 3. Home / Chat Box Screen -->
<div id="home-screen" class="screen">
    <div class="header">
        <span class="settings-icon" onclick="showScreen('settings-screen')">⚙️</span>
        <div style="display:flex; align-items: center; gap: 10px;">
            <div style="border: 2px solid var(--primary-purple); border-radius: 50%; padding: 5px;">+ Story</div>
            <div onclick="showScreen('profile-screen')" style="cursor: pointer;">Me</div>
        </div>
    </div>
    <h3>CHAT BOX (စာပို့ရန်နေရာ)</h3>
    <p style="margin-top: 50px; opacity: 0.5;">သူငယ်ချင်းစာရင်း မရှိသေးပါ။</p>
    
    <div class="chatbot-btn">🤖</div>
</div>

<!-- 4. Settings Screen -->
<div id="settings-screen" class="screen">
    <div class="card">
        <h2>Settings</h2>
        <p>Theme အရောင်ပြောင်းရန်</p>
        <input type="color" id="theme-color" onchange="changeTheme(this.value)" value="#0f111a" style="height: 50px; cursor: pointer;">
        <button class="btn btn-purple" onclick="logout()">Log Out</button>
        <button class="btn" onclick="showScreen('home-screen')">Back</button>
    </div>
</div>

<!-- 5. Profile Screen -->
<div id="profile-screen" class="screen">
    <div class="card">
        <h2>My Profile</h2>
        <input type="text" placeholder="Bio ရေးရန်">
        <input type="date" placeholder="Age (မွေးနေ့)">
        <button class="btn btn-purple">Save Profile</button>
        <button class="btn" onclick="showScreen('home-screen')">Back</button>
    </div>
</div>

<script>
    // Screen Navigation
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        // Save state for persistence
        if(screenId !== 'login-screen') {
            localStorage.setItem('isLoggedIn', 'true');
        }
    }

    // Bear Selection
    function selectBear(element) {
        document.querySelectorAll('.bear-avatar').forEach(b => b.classList.remove('selected'));
        element.classList.add('selected');
        const preview = document.getElementById('preview-circle');
        preview.innerHTML = `<img src="${element.src}" style="width:100%; border-radius:50%;">`;
    }

    // Theme Change
    function changeTheme(color) {
        document.body.style.backgroundColor = color;
        localStorage.setItem('themeColor', color);
    }

    // Logout
    function logout() {
        localStorage.removeItem('isLoggedIn');
        showScreen('login-screen');
    }

    // Persistence Check on Load
    window.onload = () => {
        if(localStorage.getItem('isLoggedIn') === 'true') {
            showScreen('home-screen');
        }
        if(localStorage.getItem('themeColor')) {
            const savedColor = localStorage.getItem('themeColor');
            document.body.style.backgroundColor = savedColor;
            document.getElementById('theme-color').value = savedColor;
        }
    };
</script>

</body>
</html>
