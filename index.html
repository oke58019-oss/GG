<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect App</title>
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1a1d29; --primary-purple: #8e44ad; --text-color: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; transition: 0.3s; }
        .screen { display: none; height: 100vh; flex-direction: column; width: 100%; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Header Layout (Image 1) */
        .home-header { display: flex; justify-content: flex-end; gap: 15px; padding: 15px; border-bottom: 1px solid #333; }
        .header-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--primary-purple); }
        .add-friend-btn { position: fixed; bottom: 30px; left: 20px; width: 55px; height: 55px; background: var(--primary-purple); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        /* Profile Layout (Image 2) */
        .container { padding: 20px; text-align: center; overflow-y: auto; flex-grow: 1; }
        .profile-img-big { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary-purple); margin: 0 auto 15px; overflow: hidden; }
        .setting-box { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; background: #25293a; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; }
        .theme-circles { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
        .color-circle { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        /* Chat Styles */
        .chat-header { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 1px solid #333; background: var(--card-bg); }
        .chat-msgs { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-bar { padding: 15px; background: var(--card-bg); border-top: 1px solid #333; }
        .comm-tools { display: flex; justify-content: space-around; padding-top: 10px; font-size: 20px; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-purple { background: linear-gradient(to right, #9d50bb, #6e48aa); color: white; }
        video { width: 100%; height: 70%; object-fit: cover; border-radius: 20px; background: #000; }
    </style>
</head>
<body>

<!-- 1. Home Screen (Image 1) -->
<div id="home-screen" class="screen active">
    <div class="home-header">
        <div class="header-icon" onclick="openCamera()">📷</div>
        <div class="header-icon" onclick="showScreen('profile-screen')">👤</div>
    </div>
    <div class="container" style="text-align: left;">
        <h3 style="color: var(--primary-purple);">CHATS</h3>
        <!-- AI Bot as Friend -->
        <div class="setting-box" style="display:flex; align-items:center; gap:15px; cursor:pointer;" onclick="showFriendInfo('AI Bot', 'Bio: I am your AI assistant.', 'Birthday: 2024-01-01')">
            <div style="font-size:35px; background:#444; border-radius:50%; width:50px; height:50px; display:flex; align-items:center; justify-content:center;">🤖</div>
            <div style="flex-grow:1;"><b>AI Chat Bot</b><br><small>မင်္ဂလာပါ၊ စကားပြောရအောင်...</small></div>
            <button class="btn-purple" style="width:auto; padding:5px 10px; border-radius:5px;" onclick="event.stopPropagation(); startChat('AI Bot', '🤖')">Chat</button>
        </div>
    </div>
    <div class="add-friend-btn" onclick="showScreen('add-friend-screen')">+</div>
</div>

<!-- 2. Friend Info Screen (နှိပ်လိုက်ရင် သူ့အချက်အလက်ပေါ်မယ်) -->
<div id="friend-info-screen" class="screen">
    <div class="container">
        <div onclick="showScreen('home-screen')" style="text-align:left; cursor:pointer; margin-bottom:20px;">← Back</div>
        <div class="profile-img-big"><div id="f-info-img" style="font-size:50px; margin-top:20px;">👤</div></div>
        <h2 id="f-info-name">User Name</h2>
        <div class="setting-box">
            <p id="f-info-bio">Bio: ...</p>
            <p id="f-info-birth">Birthday: ...</p>
        </div>
        <div style="color: var(--primary-purple); font-weight: bold; margin-bottom: 20px;">✓ Connected Friend</div>
        <button class="btn btn-purple" onclick="startChat(currentFriendName, currentFriendImg)">Chat စာပို့မည်</button>
    </div>
</div>

<!-- 3. Profile & Settings Screen (Image 2) -->
<div id="profile-screen" class="screen">
    <div class="container">
        <div onclick="showScreen('home-screen')" style="text-align:left; cursor:pointer; margin-bottom:10px;">← Back</div>
        <div class="profile-img-big"><img src="https://flaticon.com" style="width:100%"></div>
        
        <div class="setting-box">
            <label>Bio</label>
            <textarea placeholder="သင့်အကြောင်းရေးပါ..."></textarea>
        </div>

        <div class="setting-box">
            <label>Birthday & Privacy</label>
            <input type="date">
            <select>
                <option value="public">Public (အားလုံးမြင်ရမည်)</option>
                <option value="friends">Friends Only (သူငယ်ချင်းများသာ)</option>
                <option value="me">Only Me (မိမိသာ)</option>
            </select>
        </div>

        <div class="setting-box" style="text-align:center;">
            <p>Theme Color</p>
            <div class="theme-circles">
                <div class="color-circle" style="background:#0f111a" onclick="changeTheme('#0f111a')"></div>
                <div class="color-circle" style="background:#1a1a2e" onclick="changeTheme('#1a1a2e')"></div>
                <div class="color-circle" style="background:#2d132c" onclick="changeTheme('#2d132c')"></div>
                <div class="color-circle" style="background:#00203f" onclick="changeTheme('#00203f')"></div>
            </div>
        </div>

        <button class="btn" style="background:#e74c3c; color:white; margin-top:10px;" onclick="localStorage.clear(); location.reload();">Log Out ထွက်မည်</button>
    </div>
</div>

<!-- 4. Chat Screen -->
<div id="chat-screen" class="screen">
    <div class="chat-header">
        <span onclick="showScreen('home-screen')" style="cursor:pointer; font-size:24px;">←</span>
        <div id="chat-head-img" style="width:38px; height:38px; border-radius:50%; background:#444; display:flex; align-items:center; justify-content:center;"></div>
        <b id="chat-head-name">Name</b>
    </div>
    <div class="chat-msgs" id="msg-box"></div>
    <div class="input-bar">
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-in" placeholder="စာရိုက်ပါ...">
            <button class="btn btn-purple" style="width:auto" onclick="sendMsg()">Send</button>
        </div>
        <div class="comm-tools">
            <span onclick="alert('Calling...')">📞</span>
            <span onclick="alert('Video Call...')">📹</span>
            <span onclick="alert('Voice Msg...')">🎙️</span>
            <span onclick="document.getElementById('file-up').click()">🖼️</span>
            <span onclick="document.getElementById('file-up').click()">🎬</span>
        </div>
        <input type="file" id="file-up" hidden>
    </div>
</div>

<!-- Camera & Contacts Screens တွေလည်း အရင်အတိုင်း ပါဝင်ပါတယ် -->

<script>
    let currentFriendName, currentFriendImg;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // သူငယ်ချင်း အချက်အလက်ပြရန်
    function showFriendInfo(name, bio, birth) {
        currentFriendName = name;
        currentFriendImg = (name === 'AI Bot') ? '🤖' : '👤';
        document.getElementById('f-info-name').innerText = name;
        document.getElementById('f-info-bio').innerText = bio;
        document.getElementById('f-info-birth').innerText = birth;
        document.getElementById('f-info-img').innerText = currentFriendImg;
        showScreen('friend-info-screen');
    }

    // Chat စတင်ရန်
    function startChat(name, img) {
        document.getElementById('chat-head-name').innerText = name;
        document.getElementById('chat-head-img').innerText = img;
        showScreen('chat-screen');
    }

    function sendMsg() {
        let inpt = document.getElementById('chat-in');
        if(!inpt.value) return;
        document.getElementById('msg-box').innerHTML += `<div style="background:var(--primary-purple); padding:10px; border-radius:12px; align-self:flex-end; max-width:80%;">${inpt.value}</div>`;
        inpt.value = "";
    }

    // Camera
    async function openCamera() {
        showScreen('camera-screen');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = stream;
        } catch(e) { alert("Camera ပွင့်ရန် ခွင့်ပြုချက်လိုပါတယ်"); showScreen('home-screen'); }
    }

    function changeTheme(color) { document.body.style.backgroundColor = color; localStorage.setItem('themeColor', color); }
    window.onload = () => { if(localStorage.getItem('themeColor')) document.body.style.backgroundColor = localStorage.getItem('themeColor'); };
</script>

</body>
</html>
