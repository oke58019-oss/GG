<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Chat App</title>
    <style>
        :root { --primary-color: #075e54; --app-bg: #f0f2f5; }
        body { font-family: sans-serif; margin: 0; background: var(--app-bg); transition: 0.3s; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .input-group { margin: 10px; width: 80%; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 80%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* App Layout */
        header { background: var(--primary-color); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .profile-circle { width: 35px; height: 35px; border-radius: 50%; background: #ccc; cursor: pointer; border: 2px solid white; object-fit: cover; }

        /* Profile Panel */
        #profile-panel { display: none; position: fixed; inset: 0; background: white; z-index: 500; padding: 20px; overflow-y: auto; }
        .three-dots { float: right; font-size: 24px; cursor: pointer; padding: 5px; }
        .logout-btn { margin-top: 30px; background: #ff4444; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        .theme-apply-btn { margin-top: 10px; background: var(--primary-color); color: white; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; }

        /* Others */
        .story-section { padding: 15px; background: white; display: flex; border-bottom: 1px solid #eee; }
        .story-add { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #25d366; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <h2 style="color: var(--primary-color)">Welcome Chat</h2>
        <div class="input-group"><input type="text" id="login-name" placeholder="အမည် (User Name)"></div>
        <div class="input-group"><input type="tel" id="login-phone" placeholder="ဖုန်းနံပါတ်"></div>
        <div class="input-group"><input type="password" id="login-pass" placeholder="စကားဝှက် (Password)"></div>
        <button class="btn-login" onclick="handleLogin()">ဝင်မည်</button>
    </div>

    <!-- Main App Content -->
    <div id="main-app" style="display:none;">
        <header id="app-header">
            <span>Messenger</span>
            <div class="profile-circle" onclick="toggleProfile()"></div>
        </header>

        <div class="story-section">
            <div class="story-add" onclick="alert('Camera ဖွင့်နေသည်...')"></div>
        </div>

        <div style="padding: 20px; text-align: center; color: #888;">
            သူငယ်ချင်းအသစ်များထည့်ရန် + ကိုနှိပ်ပါ
        </div>
    </div>

    <!-- Profile Panel -->
    <div id="profile-panel">
        <span onclick="toggleProfile()" style="cursor:pointer; font-size: 18px;">⬅ နောက်သို့</span>
        <span class="three-dots" onclick="showOptions()">⋮</span>
        
        <center style="margin-top: 20px;">
            <div class="profile-circle" style="width:100px; height:100px;"></div>
            <h3 id="prof-name-disp">User Name</h3>
            <p id="prof-bio">Bio: Happy Coding!</p>
            <p id="prof-phone-disp">Phone: 09xxxxxxx</p>
            
            <div style="margin: 20px 0; text-align: left; width: 80%;">
                <label>ဖုန်းနံပါတ်မြင်နိုင်သူ:</label>
                <select style="width: 100%; padding: 8px; margin-top: 5px;">
                    <option>Only Me</option>
                    <option>Friends Only</option>
                    <option>Public</option>
                </select>
            </div>

            <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; width: 80%;">
                <label>Theme အရောင်ရွေးရန်:</label><br><br>
                <input type="color" id="theme-color-picker" style="width: 50px; height: 50px; cursor: pointer;">
                <br>
                <button class="theme-apply-btn" onclick="applyTheme()">တပ်ဆင်မည်</button>
            </div>

            <button class="logout-btn" onclick="handleLogout()">Log Out ထွက်မည်</button>
        </center>
    </div>

    <script>
        // ဒေတာများကို မှတ်ထားရန် Variable များ
        let registeredUser = null;

        function handleLogin() {
            const name = document.getElementById('login-name').value;
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;

            if(!name || !phone || !pass) {
                alert("အချက်အလက်အားလုံး ပြည့်စုံအောင် ဖြည့်ပါ");
                return;
            }

            // ပထမဆုံးအကြိမ်ဝင်တာဆိုရင် User ကို Register လုပ်လိုက်မယ်
            if (!registeredUser) {
                registeredUser = { name, phone, pass };
                enterApp();
            } else {
                // နောက်တစ်ကြိမ်ပြန်ဝင်ရင် ဖုန်းနဲ့ Password ကို စစ်မယ်
                if (phone === registeredUser.phone && pass === registeredUser.pass) {
                    enterApp();
                } else {
                    alert("ဖုန်းနံပါတ် သို့မဟုတ် စကားဝှက် မှားယွင်းနေပါသည်။");
                }
            }
        }

        function enterApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('prof-name-disp').innerText = registeredUser.name;
            document.getElementById('prof-phone-disp').innerText = "Phone: " + registeredUser.phone;
        }

        function handleLogout() {
            if(confirm("အကောင့်ထဲမှ ထွက်မှာ သေချာသလား?")) {
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('profile-panel').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                // Password ကွက်လပ်ကို ရှင်းထုတ်လိုက်မယ်
                document.getElementById('login-pass').value = "";
            }
        }

        function toggleProfile() {
            const panel = document.getElementById('profile-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function applyTheme() {
            const selectedColor = document.getElementById('theme-color-picker').value;
            // Header နဲ့ ခလုတ်တွေ အရောင်ပြောင်းမယ်
            document.documentElement.style.setProperty('--primary-color', selectedColor);
            // Background ကိုလည်း အရောင်ဖျော့ဖျော့လေး လိုက်ပြောင်းပေးမယ်
            document.body.style.backgroundColor = selectedColor + "11"; 
            alert("Theme ကို အောင်မြင်စွာ တပ်ဆင်လိုက်ပါပြီ။");
        }

        function showOptions() {
            const choice = confirm("Profile ပုံ ကြည့်မလား (OK) ပြောင်းမလား (Cancel)?");
            if(choice) alert("ပုံကို ပြသနေသည်...");
            else alert("Album ထဲမှ ပုံရွေးချယ်ရန် ပြင်ဆင်နေသည်...");
        }
    </script>
</body>
</html>
