<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect App</title>
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1a1d29; --primary-purple: #8e44ad; --text-color: #ffffff; --accent-green: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; width: 100%; box-sizing: border-box; }
        .active { display: flex; }
        
        /* New Header Style */
        .home-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; }
        .story-text { font-weight: bold; color: var(--text-color); font-size: 1.1rem; }
        .header-icons { display: flex; gap: 15px; }
        .green-circle-icon { 
            width: 35px; height: 35px; border-radius: 50%; 
            border: 2px solid var(--accent-green); 
            background: transparent; /* အတွင်းပိုင်း နောက်ခံအရောင် */
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Contacts & Chats Layout */
        .container { padding: 20px; text-align: left; overflow-y: auto; flex-grow: 1; }
        .setting-box { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-purple { background: var(--primary-purple); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        
        .add-friend-btn { position: fixed; bottom: 30px; left: 20px; width: 55px; height: 55px; background: var(--primary-purple); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        /* Profile Layout */
        .profile-img-big { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary-purple); margin: 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #333; }
    </style>
</head>
<body>

<!-- 1. Home Screen (CHATS) -->
<div id="home-screen" class="screen active">
    <div class="home-header">
        <div class="story-text">Story</div>
        <div class="header-icons">
            <div class="green-circle-icon" onclick="alert('Story feature coming...')"></div>
            <div class="header-icon" onclick="showScreen('profile-screen')" style="cursor:pointer; font-size: 24px;">👤</div>
        </div>
    </div>
    
    <div class="container">
        <h3 style="color: var(--primary-purple);">CHATS</h3>
        <div class="setting-box" onclick="startChat('AI Bot', '🤖')">
            <div style="font-size:35px; background:#444; border-radius:50%; width:50px; height:50px; display:flex; align-items:center; justify-content:center;">🤖</div>
            <div style="flex-grow:1;"><b>AI Chat Bot</b><br><small style="color:#aaa;">မင်္ဂလာပါ၊ စကားပြောရအောင်...</small></div>
            <button class="btn-purple">Chat</button>
        </div>
    </div>
    
    <!-- အပေါင်းခလုတ် နှိပ်ရင် Contacts ပေါ်မယ် -->
    <div class="add-friend-btn" onclick="showScreen('contacts-screen')">+</div>
</div>

<!-- 2. Contacts Screen (ဒါက အရင်က မပေါ်တဲ့ အပိုင်းပါ) -->
<div id="contacts-screen" class="screen">
    <div class="container">
        <div onclick="showScreen('home-screen')" style="cursor:pointer; margin-bottom:20px;">← Back</div>
        <h3 style="color: var(--primary-purple);">CONTACTS</h3>
        <input type="text" placeholder="Search friends..." style="width:100%; padding:10px; border-radius:10px; border:none; background:#25293a; color:white; margin-bottom:20px;">
        
        <div class="setting-box" onclick="showFriendInfo('Kyaw Kyaw', 'Hey there!', '2000-01-01', '👦')">
            <div style="font-size:30px; background:#444; border-radius:50%; width:45px; height:45px; display:flex; align-items:center; justify-content:center;">👦</div>
            <div style="flex-grow:1;"><b>Kyaw Kyaw</b></div>
            <button class="btn-purple">Connect</button>
        </div>
    </div>
</div>

<!-- 3. Profile Screen & Logout -->
<div id="profile-screen" class="screen">
    <div class="container" style="text-align:center;">
        <div onclick="showScreen('home-screen')" style="text-align:left; cursor:pointer;">← Back</div>
        <div class="profile-img-big" style="font-size: 50px;">👤</div>
        <h2>My Profile</h2>
        <button class="btn-purple" style="background:#e74c3c; width:100%; margin-top:30px;" onclick="logout()">Log Out ထွက်မည်</button>
    </div>
</div>

<!-- Login Screen (ဥပမာပြရန် ID ထည့်ထားသည်) -->
<div id="login-screen" class="screen">
    <div class="container" style="text-align:center; justify-content:center; display:flex; flex-direction:column;">
        <h1>Login</h1>
        <p>ကျေးဇူးပြု၍ ပြန်လည် Login ဝင်ပါ။</p>
        <button class="btn-purple" onclick="showScreen('home-screen')">Login ပြန်ဝင်မည်</button>
    </div>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        let target = document.getElementById(id);
        if(target) {
            target.classList.add('active');
        } else {
            console.error("Screen ID မရှိပါ: " + id);
        }
    }

    function logout() {
        // Login ဝင်တဲ့ Screen ကို ပြန်ပို့ပေးမယ်
        showScreen('login-screen'); 
    }

    // ကျန်တဲ့ Chat function တွေက အရင်အတိုင်း ထည့်ထားလို့ရပါတယ်
    function startChat(name, img) {
        alert(name + " နဲ့ စကားပြောဖို့ ချိတ်ဆက်နေပါတယ်...");
    }
</script>

</body>
</html>
