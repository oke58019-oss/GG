<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect App</title>
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1a1d29; --primary-purple: #8e44ad; --text-color: #ffffff; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Header style based on Image 1 */
        .home-header { display: flex; justify-content: flex-end; gap: 15px; padding: 10px 0; border-bottom: 1px solid #333; }
        .header-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--primary-purple); }

        /* Floating Button based on Image 1 */
        .add-friend-btn { position: fixed; bottom: 30px; left: 20px; width: 50px; height: 50px; background: var(--primary-purple); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Profile Layout based on Image 2 */
        .profile-container { text-align: center; width: 100%; }
        .profile-big-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary-purple); margin: 0 auto 20px; overflow: hidden; }
        .input-group { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
        
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #25293a; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        .theme-section { margin-top: 20px; }
        .theme-circles { display: flex; justify-content: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-purple { background: linear-gradient(to right, #9d50bb, #6e48aa); color: white; }
        .btn-logout { background: #e74c3c; color: white; margin-top: 30px; }
        
        /* Chat bot card */
        .bot-card { background: var(--card-bg); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<!-- Home Screen (Image 1 Layout) -->
<div id="home-screen" class="screen active">
    <div class="home-header">
        <div class="header-icon" onclick="showScreen('camera-screen')" title="Story">📷</div>
        <div class="header-icon" onclick="showScreen('profile-screen')" title="Profile">👤</div>
    </div>
    
    <h2 style="margin-top: 20px;">Chats</h2>
    <div class="bot-card" onclick="showScreen('bot-chat-screen')">
        <div style="font-size: 30px;">🤖</div>
        <div><b>AI Chat Bot</b><br><small>မင်္ဂလာပါ၊ စကားပြောရအောင်...</small></div>
    </div>

    <!-- Content/Friend Add Button (Bottom Left) -->
    <div class="add-friend-btn" onclick="showScreen('add-friend-screen')">+</div>
</div>

<!-- Profile Screen (Image 2 Layout) -->
<div id="profile-screen" class="screen">
    <div style="margin-bottom: 15px; cursor: pointer;" onclick="showScreen('home-screen')">← Back</div>
    
    <div class="profile-container">
        <div class="profile-big-img">
            <img src="https://flaticon.com" style="width:100%" alt="Profile">
        </div>

        <div class="input-group">
            <label>Bio</label>
            <textarea placeholder="သင့်အကြောင်းရေးပါ..."></textarea>
        </div>

        <div class="input-group">
            <label>Birthday</label>
            <input type="date">
        </div>

        <div class="theme-section">
            <p>Choose Theme Color</p>
            <div class="theme-circles">
                <div class="color-circle" style="background:#0f111a" onclick="changeTheme('#0f111a')"></div>
                <div class="color-circle" style="background:#1a1a2e" onclick="changeTheme('#1a1a2e')"></div>
                <div class="color-circle" style="background:#2d132c" onclick="changeTheme('#2d132c')"></div>
                <div class="color-circle" style="background:#00203f" onclick="changeTheme('#00203f')"></div>
                <div class="color-circle" style="background:#1e3932" onclick="changeTheme('#1e3932')"></div>
                <div class="color-circle" style="background:#4a0e0e" onclick="changeTheme('#4a0e0e')"></div>
            </div>
        </div>

        <button class="btn btn-logout" onclick="logout()">Log Out ထွက်မည်</button>
    </div>
</div>

<!-- Camera/Story Screen -->
<div id="camera-screen" class="screen" style="background: #000;">
    <div style="color: white; margin-bottom: 20px; cursor: pointer;" onclick="showScreen('home-screen')">← Close</div>
    <div style="flex-grow: 1; border: 2px dashed #444; border-radius: 20px; display: flex; align-items: center; justify-content: center;">
        Camera View
    </div>
    <div style="display: flex; justify-content: space-around; align-items: center; padding: 40px 0;">
        <div style="font-size: 30px; cursor: pointer;" onclick="alert('Album ပွင့်လာပါပြီ')">🖼️</div>
        <div style="width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #444;" onclick="alert('ပုံရိုက်လိုက်ပါပြီ')"></div>
        <div style="width: 30px;"></div>
    </div>
</div>

<!-- Add Friend Screen -->
<div id="add-friend-screen" class="screen">
    <div style="margin-bottom: 20px; cursor: pointer;" onclick="showScreen('home-screen')">← Back</div>
    <h2>ရှာဖွေပြီး Friend အပ်ရန်</h2>
    <input type="text" placeholder="ဖုန်းနံပါတ်ဖြင့် ရှာပါ...">
    <h4 style="margin-top: 30px;">ဖုန်းထဲမှ Contacts များ</h4>
    <div style="background: var(--card-bg); padding: 10px; border-radius: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333;">
            <span>Mg Mg (09123456)</span>
            <button class="btn-purple" style="padding: 5px 15px; border-radius: 5px; border: none; cursor: pointer;" onclick="alert('Add လုပ်ပြီးပါပြီ')">Add</button>
        </div>
    </div>
</div>

<!-- Bot Chat Screen -->
<div id="bot-chat-screen" class="screen">
    <div style="margin-bottom: 15px; cursor: pointer;" onclick="showScreen('home-screen')">← Back</div>
    <div id="chat-msgs" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: #333; padding: 10px; border-radius: 15px; align-self: flex-start; max-width: 80%;">မင်္ဂလာပါ! ဘာကူညီပေးရမလဲ။</div>
    </div>
    <div style="display: flex; gap: 10px; padding-top: 10px;">
        <input type="text" id="chat-input" placeholder="စာရိုက်ပါ...">
        <button class="btn btn-purple" style="width: auto; margin: 0;" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeTheme(color) {
        document.body.style.backgroundColor = color;
        localStorage.setItem('themeColor', color);
    }

    function sendMessage() {
        let input = document.getElementById('chat-input');
        if(!input.value) return;
        let box = document.getElementById('chat-msgs');
        box.innerHTML += `<div style="background: var(--primary-purple); padding: 10px; border-radius: 15px; align-self: flex-end; max-width: 80%;">${input.value}</div>`;
        
        setTimeout(() => {
            box.innerHTML += `<div style="background: #333; padding: 10px; border-radius: 15px; align-self: flex-start; max-width: 80%;">"<b>${input.value}</b>" အတွက် ကျေးဇူးတင်ပါတယ်!</div>`;
            box.scrollTop = box.scrollHeight;
        }, 800);
        input.value = "";
    }

    function logout() {
        if(confirm("အကောင့်မှ ထွက်မှာ သေချာပါသလား?")) {
            localStorage.clear();
            alert("Log Out ထွက်ပြီးပါပြီ။");
            location.reload();
        }
    }

    window.onload = () => {
        const savedColor = localStorage.getItem('themeColor');
        if(savedColor) document.body.style.backgroundColor = savedColor;
    };
</script>

</body>
</html>
