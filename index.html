<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Connect App</title>
    <style>
        :root { --main-color: #00b894; --bg-color: #f9f9f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-color); transition: 0.3s; }
        .hidden { display: none !important; }
        
        /* Login Section */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, #00b894, #00cec9); }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 85%; max-width: 350px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--main-color); color: white; font-weight: bold; cursor: pointer; }

        /* App Header */
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        .profile-thumb { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--main-color); cursor: pointer; }

        /* Story Section */
        .story-bar { padding: 15px; display: flex; gap: 10px; background: white; overflow-x: auto; }
        .story-add { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #2ecc71; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .story-item { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #ddd; flex-shrink: 0; overflow: hidden; }
        .story-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Camera Modal */
        #camera-modal { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; }
        #video-feed { flex: 1; width: 100%; object-fit: cover; }
        .cam-btns { height: 120px; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.8); }

        /* Story Preview Modal */
        #story-confirm { position: fixed; inset: 0; background: #000; z-index: 101; display: flex; flex-direction: column; color: white; }
        #captured-image { flex: 1; object-fit: contain; width: 100%; }
        .confirm-box { padding: 20px; background: rgba(0,0,0,0.9); }

        /* Chatbot Box */
        .ai-chat { margin: 15px; background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .chat-log { height: 150px; overflow-y: auto; font-size: 14px; margin-bottom: 10px; }
        
        /* Profile Overlay */
        #profile-overlay { position: fixed; inset: 0; background: white; z-index: 200; padding: 20px; }
        .profile-img-big { width: 100px; height: 100px; border-radius: 50%; background: #eee; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="card">
            <h2 style="text-align: center; color: var(--main-color);">Connect Login</h2>
            <input type="text" id="u-name" placeholder="User Name">
            <input type="tel" id="u-phone" placeholder="Phone Number">
            <input type="password" id="u-pass" placeholder="Password">
            <button onclick="login()">Get Started</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-main" class="hidden">
        <header>
            <h3 style="margin:0; color: var(--main-color);">MESSENGER</h3>
            <img src="https://flaticon.com" class="profile-thumb" onclick="openProfile()">
        </header>

        <!-- Stories -->
        <div class="story-bar">
            <div class="story-add" onclick="startCamera()">
                <div style="background: #eee; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;">+</div>
            </div>
            <div id="active-stories" style="display: flex; gap: 10px;"></div>
        </div>

        <!-- Bot -->
        <div class="ai-chat">
            <b>Welcome Chatbot (AI)</b>
            <div id="chat-box" class="chat-log">
                <div style="color: #666;">AI: Hello! Start chatting with me...</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="ai-input" placeholder="Type here...">
                <button onclick="aiReply()" style="width: 60px;">Send</button>
            </div>
        </div>

        <button style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; font-size: 25px;">+</button>
    </div>

    <!-- CAMERA MODAL -->
    <div id="camera-modal" class="hidden">
        <video id="video-feed" autoplay playsinline></video>
        <div class="cam-btns">
            <button onclick="stopCamera()" style="background: grey;">Cancel</button>
            <button onclick="takePhoto()" style="width: 70px; height: 70px; border-radius: 50%; border: 5px solid white;"></button>
            <button onclick="flipCamera()">Flip</button>
        </div>
    </div>

    <!-- STORY CONFIRMATION -->
    <div id="story-confirm" class="hidden">
        <canvas id="canvas" class="hidden"></canvas>
        <img id="captured-image">
        <div class="confirm-box">
            <label>Who can see this?</label>
            <select id="story-privacy">
                <option value="Public">Public</option>
                <option value="Friends Only">Friends Only</option>
                <option value="Only Me">Only Me</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button onclick="cancelPost()" style="background: #555;">မတင်ပါ</button>
                <button onclick="postStory()">တင်မည်</button>
            </div>
            <p style="font-size: 12px; color: #aaa; text-align: center; margin-top: 10px;">* ပိုစ့်တင်ပြီး ၂၄ နာရီအကြာတွင် အလိုအလျောက် ပျောက်သွားပါမည်။</p>
        </div>
    </div>

    <!-- PROFILE VIEW -->
    <div id="profile-overlay" class="hidden">
        <button onclick="closeProfile()" style="width: 80px; margin-bottom: 20px;">Back</button>
        <div style="text-align: center; position: relative;">
            <div style="position: absolute; right: 0; font-size: 24px; cursor: pointer;" onclick="document.getElementById('opt-menu').classList.toggle('hidden')">⋮</div>
            <div id="opt-menu" class="hidden" style="position: absolute; right: 0; top: 30px; background: #eee; text-align: left; padding: 10px; border-radius: 10px; z-index: 10;">
                <div onclick="alert('Viewing...')">ကြည့်မယ်</div>
                <hr>
                <div onclick="alert('Changing...')">ပြောင်းမယ် (Emblem)</div>
            </div>
            <img src="https://flaticon.com" class="profile-img-big">
            <h2 id="p-name">Username</h2>
            <p id="p-bio" style="color: #777;">Hey there! I am using Connect.</p>
            <hr>
            <div style="text-align: left; padding: 10px;">
                <p>Phone: <span id="p-phone">09...</span> 
                   <select style="width: 100px; float: right; margin: 0; padding: 5px;">
                       <option>Public</option><option>Fri Only</option><option>Only Me</option>
                   </select>
                </p>
                <p>Theme: <input type="color" onchange="document.documentElement.style.setProperty('--main-color', this.value)" style="width: 50px; padding: 0; height: 30px;"></p>
            </div>
            <button onclick="logout()" style="background: #eb4d4b; margin-top: 50px;">Logout</button>
        </div>
    </div>

    <script>
        let stream;
        let mode = "user";
        let capturedDataUrl = "";

        // 1. Auth Logic
        window.onload = () => {
            const user = localStorage.getItem('social_user');
            if(user) { fillData(JSON.parse(user)); showHome(); }
        };

        function login() {
            const data = {
                name: document.getElementById('u-name').value,
                phone: document.getElementById('u-phone').value,
                pass: document.getElementById('u-pass').value
            };
            if(!data.name || !data.phone) return alert("Fill all info!");
            localStorage.setItem('social_user', JSON.stringify(data));
            fillData(data);
            showHome();
        }

        function fillData(u) {
            document.getElementById('p-name').innerText = u.name;
            document.getElementById('p-phone').innerText = u.phone;
        }

        function showHome() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }

        // 2. AI Chat
        function aiReply() {
            const input = document.getElementById('ai-input');
            const box = document.getElementById('chat-box');
            if(!input.value) return;
            box.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
            setTimeout(() => {
                box.innerHTML += `<div style="color:blue;"><b>AI:</b> Thinking about "${input.value}"... I am here to help!</div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
            input.value = "";
        }

        // 3. Camera & Story Logic
        async function startCamera() {
            document.getElementById('camera-modal').classList.remove('hidden');
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            document.getElementById('video-feed').srcObject = stream;
        }

        function stopCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-modal').classList.add('hidden');
        }

        function flipCamera() {
            mode = (mode === "user") ? "environment" : "user";
            stopCamera(); startCamera();
        }

        function takePhoto() {
            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedDataUrl = canvas.toDataURL('image/jpeg');
            
            document.getElementById('captured-image').src = capturedDataUrl;
            document.getElementById('camera-modal').classList.add('hidden');
            document.getElementById('story-confirm').classList.remove('hidden');
            stopCamera();
        }

        function cancelPost() {
            document.getElementById('story-confirm').classList.add('hidden');
            capturedDataUrl = "";
        }

        function postStory() {
            const privacy = document.getElementById('story-privacy').value;
            const container = document.getElementById('active-stories');
            
            // Create Story Element
            const div = document.createElement('div');
            div.className = "story-item";
            div.style.borderColor = "#00b894";
            div.innerHTML = `<img src="${capturedDataUrl}" title="Privacy: ${privacy}">`;
            container.prepend(div);

            // 24 Hour Logic (Real 24hr = 86400000 ms)
            // For Demo: we set 1 minute (60000 ms) to see it vanish
            setTimeout(() => {
                div.remove();
                console.log("Story expired after 24 hours");
            }, 86400000); 

            alert(`Story posted as ${privacy}! It will disappear in 24 hours.`);
            cancelPost();
        }

        // 4. Profile UI
        function openProfile() { document.getElementById('profile-overlay').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profile-overlay').classList.add('hidden'); }
    </script>
</body>
</html>
