<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body{margin:0;font-family:sans-serif}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
input{margin:5px;padding:10px;width:220px}

/* CHAT */
#chat{display:none;height:100vh;background:skyblue;position:relative}
#profileBtn{
  position:absolute;top:10px;left:10px;
  width:50px;height:50px;border-radius:50%;
  background:#ccc;overflow:hidden
}
#profileBtn img{width:100%;height:100%}

/* STORY */
#storyBtn{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 width:60px;height:60px;border-radius:50%;
 border:3px solid green;text-align:center;line-height:60px;
 cursor:pointer
}

/* MESSAGE */
#messages{
 position:absolute;bottom:80px;width:100%;height:60%;overflow:auto
}

/* INPUT */
#inputArea{
 position:absolute;bottom:0;width:100%;display:flex
}
#inputArea input{flex:1}
#file{display:none}

/* PROFILE PAGE */
#profile{display:none;padding:20px}
.color{width:30px;height:30px;display:inline-block;margin:5px;cursor:pointer}

/* STORY VIEW */
#storyView{display:none;padding:20px}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
<div id="profileBtn" onclick="openProfile()"></div>
<div id="storyBtn" onclick="openStoryUpload()">+</div>

<div id="messages"></div>

<div id="inputArea">
<button onclick="openFile()">+</button>
<input type="file" id="file" accept="image/*,video/*">
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- PROFILE -->
<div id="profile">
<button onclick="back()">⬅</button>
<h2 id="pname"></h2>
<img id="pimg" width="100"><br><br>

<input type="file" id="pUpload"><br>
<button onclick="changeProfile()">Change Profile</button>
<button onclick="deleteProfile()">Delete</button>

<p>ID: <span id="pid"></span></p>

<select id="privacy">
<option>Only me</option>
<option>Friend only</option>
<option>
