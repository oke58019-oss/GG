<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro Max (Anti-Exit)</title>
    <style>
        :root { --primary-color: #075e54; --app-bg: #0b141a; }
        body { font-family: sans-serif; margin: 0; background: var(--app-bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #1f2c34; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a3942; }
        .user-info { flex: 1; font-weight: bold; }

        #message-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 15px; }
        .sent { align-self: flex-end; background: #005c4b; color: white; }
        .received { align-self: flex-start; background: #202c33; color: white; }

        .input-bar { background: #1f2c34; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; }
        .action-btn { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Full Screen Modals */
        .modal-screen { display: none; position: fixed; inset: 0; background: #0b141a; z-index: 5000; flex-direction: column; padding: 20px; }
        .contact-item { background: #1f2c34; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="user-info">AI Chat Bot 🤖</div>
        <button onclick="openContacts()" style="background:#00a884; color:white; border:none; padding:8px 12px; border-radius:5px;">👤 Contacts</button>
    </header>

    <div id="message-area"></div>

    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="စာရိုက်ပါ...">
        <button class="action-btn" onclick="sendMessage()">➤</button>
    </div>

    <!-- Contacts Modal -->
    <div id="contact-modal" class="modal-screen">
        <h3>ဖုန်းနံပါတ်များ</h3>
        <div id="contact-list" style="overflow-y: auto; flex:1;"></div>
        <button onclick="goBack()" style="padding:15px; background:red; color:white; border:none; border-radius:10px; margin-top:10px;">နောက်သို့</button>
    </div>

    <script>
        const messageArea = document.getElementById('message-area');
        const msgInput = document.getElementById('msg-input');

        // Restart ချလည်း စာမပျက်အောင် သိမ်းထားတာ ပြန်ခေါ်မယ်
        window.onload = () => {
            const savedMsgs = localStorage.getItem('chat_history');
            if (savedMsgs) messageArea.innerHTML = savedMsgs;
            messageArea.scrollTop = messageArea.scrollHeight;
            
            // App ထဲရောက်တာနဲ့ အပြင်မထွက်သွားအောင် သော့ခတ်မယ်
            history.pushState(null, null, location.href);
        };

        // Browser Back နှိပ်ရင် တဆင့်ချင်း ထွက်ဖို့
        window.onpopstate = function () {
            const contactModal = document.getElementById('contact-modal');
            if (contactModal.style.display === 'flex') {
                contactModal.style.display = 'none';
                history.pushState(null, null, location.href); // State ပြန်ဖြည့်မယ်
            } else {
                if(confirm("App မှ ထွက်မှာ သေချာသလား?")) {
                    history.back();
                } else {
                    history.pushState(null, null, location.href);
                }
            }
        };

        function openContacts() {
            document.getElementById('contact-modal').style.display = 'flex';
            history.pushState(null, null, location.href); // Back တဆင့်ပြန်လာဖို့
            
            // Dummy Contacts (နမူနာ နံပါတ်များ)
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            const dummy = [{n:'Kyaw Kyaw', p:'091234567'}, {n:'Su Su', p:'098765432'}];
            dummy.forEach(c => {
                const d = document.createElement('div');
                d.className = 'contact-item';
                d.innerHTML = `<b>${c.n}</b><br>${c.p}`;
                d.onclick = () => { addMessage(`${c.n} ကို ရွေးလိုက်သည်`, 'sent'); goBack(); };
                list.appendChild(d);
            });
        }

        function goBack() {
            window.history.back(); // window.onpopstate ကနေ modal ကို ပိတ်ပေးလိမ့်မယ်
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            addMessage(text, 'sent');
            msgInput.value = "";
            setTimeout(() => addMessage("AI: ဟုတ်ကဲ့ပါဗျာ။", 'received'), 800);
        }

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerText = text;
            messageArea.appendChild(msgDiv);
            messageArea.scrollTop = messageArea.scrollHeight;
            localStorage.setItem('chat_history', messageArea.innerHTML);
        }
    </script>
</body>
</html>
