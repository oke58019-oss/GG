<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sky Chat</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(#87CEEB,#cfefff);
}

/* PAGE */
.page{display:none;height:100vh}

/* BUTTON */
.btn{
 background:linear-gradient(45deg,#00c6ff,#0072ff);
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:20px;
 margin:3px;
}

/* LOGIN */
#login{
 display:flex;
 justify-content:center;
 align-items:center;
}
.card{
 background:white;
 padding:20px;
 border-radius:20px;
 width:90%;
 max-width:350px;
}
input,textarea{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:1px solid #ccc;
}

/* CHAT LIST */
.top{
 display:flex;
 justify-content:space-between;
 padding:10px;
}
.circle{
 width:40px;height:40px;
 border-radius:50%;
 background:#ddd;
 overflow:hidden;
}
.story{
 width:50px;height:50px;
 border-radius:50%;
 border:3px solid green;
 display:flex;
 align-items:center;
 justify-content:center;
 background:white;
 margin:auto;
}
.user{
 background:white;
 padding:10px;
 margin:5px;
 border-radius:15px;
 display:flex;
 justify-content:space-between;
}

/* CHAT ROOM */
#chatRoom{display:flex;flex-direction:column}
#msgs{flex:1;overflow:auto;padding:10px}
.msg{
 background:white;
 padding:8px;
 margin:5px;
 border-radius:12px;
 max-width:70%;
}
.me{margin-left:auto;background:#d1f0ff}

#inputBar{
 display:flex;
 background:white;
 padding:5px;
}
#inputBar input{flex:1;border:none}

/* FLOAT + */
#addBtn{
 position:fixed;
 bottom:20px;
 right:20px;
 width:50px;height:50px;
 border-radius:50%;
 font-size:25px;
}

/* PROFILE */
.center{text-align:center}

/* STORY */
.storyBox{
 background:white;
 margin:5px;
 padding:10px;
 border-radius:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:flex">
<div class="card">
<h2>Login</h2>
<input id="name" placeholder="Username">
<input id="phone" placeholder="Phone">
<input id="pass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<!-- CHAT LIST -->
<div id="chatList" class="page">
<div class="top">
<div class="circle" onclick="openProfile()"></div>
<div class="story" onclick="openStory()">+</div>
<button class="btn" onclick="logout()">Logout</button>
</div>

<div id="users"></div>

<button id="addBtn" class="btn" onclick="openAdd()">+</button>
</div>

<!-- ADD -->
<div id="addPage" class="page">
<button class="btn" onclick="back()">⬅</button>
<input id="search" placeholder="Phone / ID">
<button class="btn" onclick="searchUser()">Search</button>
<div id="result"></div>
</div>

<!-- CHAT -->
<div id="chatRoom" class="page">
<div class="top">
<button class="btn" onclick="back()">⬅</button>
<span id="chatName"></span>
</div>

<div id="msgs"></div>

<div id="inputBar">
<input id="msg">
<input type="file" id="file" accept="image/*,video/*">
<button class="btn" onclick="send()">Send</button>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page center">
<button class="btn" onclick="back()">⬅</button>

<div class="circle" id="pimg"></div>
<input type="file" onchange="changePic(this)">

<h3 id="pname"></h3>
<p id="pid"></p>

<textarea id="bio" placeholder="Bio"></textarea>

<select id="privacy">
<option>Only Me</option>
<option>Friend Only</option>
<option>Public</option>
</select>

<br>
<button class="btn" onclick="saveProfile()">Save</button>

<h4>Background</h4>
<button class="btn" onclick="bg('pink')">Pink</button>
<button class="btn" onclick="bg('orange')">Orange</button>
<button class="btn" onclick="bg('lightgreen')">Green</button>
<button class="btn" onclick="bg('white')">White</button>
<button class="btn" onclick="bg('black')">Black</button>
</div>

<!-- STORY -->
<div id="story" class="page">
<button class="btn" onclick="back()">⬅</button>

<input type="file" id="storyFile" accept="image/*,video/*">
<select id="sPrivacy">
<option>Only Me</option>
<option>Friend Only</option>
<option>Public</option>
</select>

<button class="btn" onclick="uploadStory()">Post</button>

<div id="stories"></div>
</div>

<script>

/* NAV */
function show(x){
 document.querySelectorAll(".page").forEach(p=>p.style.display="none");
 document.getElementById(x).style.display="block";
}
function back(){show("chatList")}

/* LOGIN */
function login(){
 if(localStorage.pass && pass.value!=localStorage.pass){
  alert("Password မှား");
  return;
 }
 localStorage.name=name.value;
 localStorage.phone=phone.value;
 localStorage.pass=pass.value;

 show("chatList");
 loadUsers();
}

/* LOGOUT */
function logout(){
 location.reload();
}

/* USERS */
function loadUsers(){
 users.innerHTML="";
 let arr=["091111","092222","093333"];
 arr.forEach(u=>{
  let d=document.createElement("div");
  d.className="user";
  d.innerHTML=`${u}
  <div>
   <button class="btn" onclick="addFriend('${u}')">Add</button>
   <button class="btn" onclick="chat('${u}')">Chat</button>
  </div>`;
  users.appendChild(d);
 });
}

/* ADD */
function openAdd(){show("addPage")}
function searchUser(){
 result.innerHTML=`<div class="user">
  0912345
  <button class="btn" onclick="chat('0912345')">Chat</button>
 </div>`;
}

/* CHAT */
let current="";
function chat(n){
 current=n;
 chatName.innerText=n;
 show("chatRoom");
 loadMsg();
}

function send(){
 let text=msg.value;
 let arr=JSON.parse(localStorage["msg_"+current]||"[]");
 arr.push({t:text,me:true});
 localStorage["msg_"+current]=JSON.stringify(arr);
 msg.value="";
 loadMsg();
}

 msgs.innerHTML="";
 let arr
