<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Pro - Dual Camera Mode</title>
    <style>
        :root { --primary-color: #8e44ad; --bg-color: #0f111a; --card-bg: #1a1d29; --text-color: #ffffff; --accent-green: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; width: 100%; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Layouts */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; background: var(--bg-color); }
        .container { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .item-card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        
        /* Story Section */
        .story-container { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; border-bottom: 1px solid #222; }
        .story-circle { min-width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent-green); display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; }

        /* Chat Bar */
        .chat-input-bar { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: var(--card-bg); border-top: 1px solid #333; }
        .chat-input-bar input { flex-grow: 1; background: #25293a; border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }

        /* Overlays (Full Screen Camera/Call) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 50px; display: flex; gap: 30px; align-items: center; z-index: 1100; }
        .shutter { width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; cursor: pointer; }
        .switch-btn { font-size: 35px; color: white; cursor: pointer; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; }

        .btn-purple { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="screen active">
    <div class="container" style="text-align:center; display:flex; flex-direction:column; justify-content:center;">
        <h1>Connect</h1>
        <input type="tel" id="login-phone" style="width:100%; padding:15px; border-radius:10px; border:none; background:#25293a; color:white; margin-bottom:15px;" placeholder="Phone Number (09...)">
        <button class="btn-purple" onclick="handleLogin()">Login</button>
    </div>
</div>

<!-- Home Screen -->
<div id="home-screen" class="screen">
    <div class="header">
        <span style="font-weight:bold;">Connect</span>
        <div class="avatar" style="width:35px; height:35px; font-size:18px;" onclick="showScreen('profile-screen')">👤</div>
    </div>
    <div class="story-container">
        <div class="story-circle" style="border: 2px dashed #555;" onclick="openCamera('story')">+</div>
        <div class="story-circle">👦</div>
        <div class="story-circle">👧</div>
    </div>
    <div class="container" id="chat-list">
        <!-- Chats will load here -->
    </div>
</div>

<!-- Chat Window -->
<div id="chat-window" class="screen">
    <div class="header">
        <div onclick="showScreen('home-screen')">←</div>
        <div id="chat-user-name" style="font-weight:bold;">User</div>
        <div style="display:flex; gap:15px;">
            <span onclick="alert('Calling...')">📞</span>
            <span onclick="openCamera('vc')">📹</span>
        </div>
    </div>
    <div class="container" id="chat-messages" style="background:#0b0d14;"></div>
    <div class="chat-input-bar">
        <span style="font-size:20px; cursor:pointer;">🖼️</span>
        <input type="text" id="msg-input" placeholder="Message...">
        <button style="background:none; border:none; color:var(--primary-color); font-weight:bold;" onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- Camera Overlay (Selfie/Back Switching) -->
<div id="camera-overlay" class="overlay">
    <video id="video-preview" autoplay playsinline></video>
    <div class="cam-controls">
        <!-- Album/Gallery -->
        <span style="font-size:30px; cursor:pointer;" onclick="alert('Open Gallery...')">🖼️</span>
        
        <!-- Shutter Button -->
        <div class="shutter" onclick="closeOverlay()"></div>
        
        <!-- Camera Switch Button (Selfie vs Back) -->
        <div class="switch-btn" onclick="switchCamera()">🔄</div>
        
        <!-- Exit -->
        <span style="font-size:30px; cursor:pointer; position:absolute; top:-500px; right: 0;" onclick="closeOverlay()">✕</span>
    </div>
    <h3 id="cam-type" style="position:absolute; top:20px; color:white;">Story Mode</h3>
</div>

<script>
    let currentStream = null;
    let useFrontCamera = true; // Default as Selfie
    let currentMode = 'story';

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleLogin() {
        if(document.getElementById('login-phone').value) {
            showScreen('home-screen');
            loadChats();
        }
    }

    function loadChats() {
        document.getElementById('chat-list').innerHTML = `
            <div class="item-card" onclick="openChat('Welcome Bot')">
                <div class="avatar">🤖</div>
                <div style="flex-grow:1;"><b>Welcome Bot</b><br><small>Hi there!</small></div>
            </div>`;
    }

    function openChat(name) {
        document.getElementById('chat-user-name').innerText = name;
        showScreen('chat-window');
    }

    function openCamera(mode) {
        currentMode = mode;
        document.getElementById('cam-type').innerText = mode === 'story' ? "Story Mode" : "Video Call";
        document.getElementById('camera-overlay').style.display = 'flex';
        startStream();
    }

    function startStream() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const constraints = {
            video: { facingMode: (useFrontCamera ? "user" : "environment") }
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => {
                currentStream = stream;
                document.getElementById('video-preview').srcObject = stream;
            })
            .catch(err => alert("Camera error: " + err));
    }

    function switchCamera() {
        useFrontCamera = !useFrontCamera; // Toggle Selfie/Back
        startStream(); // Restart stream with new camera
    }

    function closeOverlay() {
        document.getElementById('camera-overlay').style.display = 'none';
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
    }

    function sendMessage() {
        let inp = document.getElementById('msg-input');
        if(inp.value) {
            let m = document.createElement('div');
            m.style.padding = "10px"; m.style.background = "var(--primary-color)";
            m.style.alignSelf = "flex-end"; m.style.borderRadius = "10px";
            m.style.margin = "5px"; m.innerText = inp.value;
            document.getElementById('chat-messages').appendChild(m);
            inp.value = "";
        }
    }
</script>

</body>
</html>
